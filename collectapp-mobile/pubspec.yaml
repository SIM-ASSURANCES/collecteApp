name: collectapp_mobile
description: SIM Assurances CI — Application mobile de collecte terrain
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0

  # State management
  flutter_riverpod: ^2.5.1

  # HTTP
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1

  # Storage sécurisé (token JWT)
  flutter_secure_storage: ^9.2.2

  # Cache local / offline
  hive_flutter: ^1.1.0

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  qr_flutter: ^4.1.0

  # Utilitaires
  intl: ^0.19.0
  connectivity_plus: ^6.0.3
  shared_preferences: ^2.2.3
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
