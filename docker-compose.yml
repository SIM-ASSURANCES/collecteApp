version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: collectapp_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./collectapp-backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: collectapp_db
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 8h
      CORS_ORIGIN: https://collecte.mysimassurances.com
      WAVE_API_KEY: ${WAVE_API_KEY:-}
      WAVE_WEBHOOK_SECRET: ${WAVE_WEBHOOK_SECRET:-}
      WAVE_MERCHANT_QR_CODE: ${WAVE_MERCHANT_QR_CODE:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
      - dokploy-network
    restart: unless-stopped

  frontend:
    build:
      context: ./collectapp-admin
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    depends_on:
      - backend
    networks:
      - app-network
      - dokploy-network
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.collectapp.rule=Host(`collecte.mysimassurances.com`)"
      - "traefik.http.routers.collectapp.entrypoints=websecure"
      - "traefik.http.routers.collectapp.tls.certresolver=letsencrypt"
      - "traefik.http.services.collectapp.loadbalancer.server.port=80"

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
  dokploy-network:
    external: true
