version: '3.8'

services:
  backend:
    image: ghcr.io/sim-assurances/collectapp-backend:v0
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 24h
      CORS_ORIGIN: https://collecte.mysimassurances.com
    networks:
      - app-network
      - dokploy-network
    restart: unless-stopped

  frontend:
    image: ghcr.io/sim-assurances/collectapp-frontend:v0
    depends_on:
      - backend
    networks:
      - app-network
      - dokploy-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
  dokploy-network:
    external: true
