version: '3.8'

services:
  backend:
    image: ghcr.io/sim-assurances/collectapp-backend:v0
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 8h
      CORS_ORIGIN: https://collecte.mysimassurances.com
      WAVE_API_KEY: ${WAVE_API_KEY:-}
      WAVE_WEBHOOK_SECRET: ${WAVE_WEBHOOK_SECRET:-}
      WAVE_MERCHANT_QR_CODE: ${WAVE_MERCHANT_QR_CODE:-}
    networks:
      - dokploy-network
    restart: unless-stopped

  frontend:
    image: ghcr.io/sim-assurances/collectapp-frontend:v0
    depends_on:
      - backend
    networks:
      - dokploy-network
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.collectapp.rule=Host(`collecte.mysimassurances.com`)"
      - "traefik.http.routers.collectapp.entrypoints=websecure"
      - "traefik.http.routers.collectapp.tls.certresolver=letsencrypt"
      - "traefik.http.services.collectapp.loadbalancer.server.port=80"

networks:
  dokploy-network:
    external: true
