services:
  collecte-backend:
    image: ghcr.io/sim-assurances/collectapp-backend:v20
    environment:
      NODE_ENV: production
      PORT: 5000
      # âš ï¸ Valeurs rÃ©elles Ã  renseigner dans l'onglet Dokploy (jamais dans Git)
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 24h
      CORS_ORIGIN: https://collecte.mysimassurances.com
      WAVE_API_KEY: ${WAVE_API_KEY}
      WAVE_WEBHOOK_SECRET: ${WAVE_WEBHOOK_SECRET}
    networks:
      - dokploy-network
    restart: unless-stopped

  collecte-frontend:
    image: ghcr.io/sim-assurances/collectapp-frontend:v19
    depends_on:
      - collecte-backend
    networks:
      - dokploy-network
    restart: unless-stopped

networks:
  dokploy-network:
    external: true
